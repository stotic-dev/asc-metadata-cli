name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "リリースバージョン (v は付けない。例: 1.0.0)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Swift バージョンを確認
        run: swift --version

      - name: タグ名を決定
        id: tag
        run: echo "name=v${{ inputs.version }}" >> "$GITHUB_OUTPUT"

      - name: artifactbundle をビルド
        run: make release VERSION=${{ inputs.version }}

      - name: タグを作成し GitHub Release にバイナリ zip を添付
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # 既存の最新タグをリリースノートの起点にする (新タグはまだ未作成)
          PREVIOUS_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")

          if [ -n "$PREVIOUS_TAG" ]; then
            gh release create "${{ steps.tag.outputs.name }}" \
              binary/asc-metadata-cli.artifactbundle.zip \
              binary/asc-metadata-cli.artifactbundle.zip.checksum \
              --target "$GITHUB_SHA" \
              --title "Release ${{ steps.tag.outputs.name }}" \
              --generate-notes \
              --notes-start-tag "$PREVIOUS_TAG"
          else
            gh release create "${{ steps.tag.outputs.name }}" \
              binary/asc-metadata-cli.artifactbundle.zip \
              binary/asc-metadata-cli.artifactbundle.zip.checksum \
              --target "$GITHUB_SHA" \
              --title "Release ${{ steps.tag.outputs.name }}" \
              --generate-notes
          fi
          echo "🎉 GitHub Release を作成しました"
